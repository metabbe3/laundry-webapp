services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: laundry
      MARIADB_DATABASE: laundry_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:laundry@db:3306/laundry_db"
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: laundry
      DATABASE_NAME: laundry_db
      DATABASE_PORT: "3306"
      AUTH_SECRET: ${AUTH_SECRET:-change-this-secret-in-production}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && node server.js"

volumes:
  db_data:
