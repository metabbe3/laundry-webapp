services:
  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: laundry
      MARIADB_DATABASE: laundry_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:laundry@db:3306/laundry_db"
      DATABASE_HOST: db
      DATABASE_USER: root
      DATABASE_PASSWORD: laundry
      DATABASE_NAME: laundry_db
      DATABASE_PORT: "3306"
      AUTH_SECRET: docker-dev-secret-change-me
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind mount source for hot reload
      - ./app:/app/app
      - ./components:/app/components
      - ./hooks:/app/hooks
      - ./lib:/app/lib
      - ./middleware.ts:/app/middleware.ts
      # Don't overwrite these from host
      - /app/node_modules
      - /app/.next
    command: >
      sh -c "npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts && npm run dev -- -H 0.0.0.0"

volumes:
  db_data:
